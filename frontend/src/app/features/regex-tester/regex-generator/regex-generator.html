<div class="tab-content">
  <h2>Regex Generator</h2>

  <div class="generator-layout">
    <div class="input-group">
      <label>Describe what you want to match</label>
      <div class="generator-input-row">
      
        <app-input
          class="input-text"
          [value]="generatorInput()"
          [placeholder]="'e.g. digit 3 times, letter, email, start'"
          (handleInputChange)="handleGeneratorInputChange($event)"
        />
        <app-button
          [label]="'Add'"
          (click)="addPart(generatorInput())"
          [disabled]="!generatorInput()"
        />
      </div>
    </div>

    <div class="available-tokens">
      <label>Available tokens:</label>

      <div class="token-chips">
        @for (token of TOKEN_CATEGORIES; track token) {
          <app-chip [label]="token" (chipClick)="addPart(token)"> </app-chip>
        }
      </div>
    </div>

    @if (parts().length > 0) {
      <div class="parts-list">
        <div class="parts-header">
          <label>Parts:</label>
          <button class="clear-btn" (click)="clearParts()">Clear all</button>
        </div>
        @for (part of parts(); track $index) {
          <div class="part-item">
            <span class="part-label">{{ part.label }}</span>
            <code class="part-value">{{ part.value }}</code>
            <button class="remove-btn" (click)="removePart($index)">x</button>
          </div>
        }
      </div>

      <div class="built-regex-section">
        <label>Generated Regex:</label>
        @if (builtRegex(); as regex) {
          <div class="built-regex">
            <code>/{{ regex }}/</code>
            <lucide-icon class="copy-icon" name="copy" [size]="18" (click)="copyBuiltRegex()" />
          </div>
        } @else {
          <div class="status invalid">Invalid combination</div>
        }
      </div>
    }
  </div>
</div>

<div class="json-tools-container">
  <h2>JSON Tools</h2>

  <div class="json-tools-content">
    <app-textarea
      class="input-textarea"
      [value]="inputJson()"
      [placeholder]="'Enter JSON here...'"
      (handleInputChange)="onInputChange($event)"
    />

    <app-textarea
      class="output-textarea"
      [value]="outputText()"
      [placeholder]="'Output'"
      [isOutputContainer]="true"
      [description]="'No output yet'"
      [errorMessage]="errorMessage()"
    />
  </div>

  <div class="json-tools-buttons">
    <app-button
      class="button"
      [label]="'Format'"
      [disabled]="!inputJson()"
      (click)="formatJson()"
    />
    <app-button
      class="button"
      [label]="'JSON → Interface'"
      [disabled]="!inputJson()"
      (click)="jsonToInterface()"
    />
  </div>
</div>

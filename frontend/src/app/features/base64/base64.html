<div class="base64-container">
  <h2>Base64 Converter</h2>

  <div class="base64-content">
    <app-textarea
      class="input-textarea"
      [value]="text()"
      [placeholder]="'Enter text here'"
      (handleInputChange)="handleInputChange($event)"
    />
    <app-textarea
      class="output-textarea"
      [value]="result()"
      [description]="'No result yet'"
      [isOutputContainer]="true"
      [errorMessage]="error()"
    />
  </div>

  <div class="base64-buttons">
    <app-button
      class="button"
      [label]="'Encode to Base64'"
      (click)="encode()"
      [disabled]="!text()"
    />
    <app-button
      class="button"
      [label]="'Decode from Base64'"
      (click)="decode()"
      [disabled]="!result()"
    />
  </div>
</div>

<div class="container">
  @if (loading()) {
    <app-spinner [size]="32" />
  } @else if (error()) {
    <div class="error-message">{{ error() }}</div>
  } @else {
    @if (tools().length > 0) {
      <app-search (searchTermChanged)="onSearchTermChanged($event)" />

      <div class="filters">
        @for (category of categories(); track category) {
          <app-filter-chip
            [category]="category"
            [(activeCategory)]="activeChip"
            (activeCategoryChange)="onFilterChanged($event)"
          />
        }
      </div>

      <div class="tools-container">
        @for (tool of filteredTools(); track tool.id) {
          <app-tool-card
            [tool]="tool"
            [isFavorite]="tool.isFavorite"
            (toggleFavorite)="onToggleFavorite($event)"
            (toolClicked)="handleToolClicked($event)"
          />
        } @empty {
          <p class="no-tools-found">No tools found</p>
        }
      </div>
    } @else {
      <p class="no-tools-found">No tools available</p>
    }
  }
</div>

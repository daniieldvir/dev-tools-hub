<div class="jwt-decoder-container">
  <h2>JWT Viewer</h2>

  <div class="jwt-decoder-content">
    <app-textarea
      class="input-textarea"
      [value]="token()"
      [placeholder]="'Paste JWT here'"
      (handleInputChange)="handleTokenChange($event)"
    />

    <app-textarea
      class="output-textarea"
      [value]="payload() ? (payload() | json) : ''"
      [description]="'No token decoded yet'"
      [isOutputContainer]="true"
      [errorMessage]="error() ?? ''"
    />
  </div>
  <app-button class="button" (click)="decodeToken()" [label]="'Decode'" [disabled]="!token()" />
</div>

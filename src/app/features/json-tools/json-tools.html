<div class="json-tools-container">
    <h2>JSON Tools</h2>
  
    <div class="json-tools-content">
        <textarea
        #input
        placeholder="Enter JSON here..."
        class="panel-style"
        (input)="handleInputChange(input.value)"></textarea>
      
      <textarea
        placeholder="Output"
        class="panel-style"
        [value]="outputText()"
        disabled></textarea>
    
    </div>
  
    <div class="json-tools-buttons">
      <app-button class="button" [label]="'Format'" (click)="formatJson()"></app-button>
      <app-button class="button" [label]="'JSON → Interface'" (click)="jsonToInterface()"></app-button>
    </div>
  </div>

<div class="timestamp-converter-container">
  <h2>Timestamp Converter</h2>
  <div class="timestamp-converter-content">
    <app-input
      class="input-number"
      [type]="'number'"
      [value]="timestamp()"
      [placeholder]="'Enter Unix timestamp'"
      (handleInputChange)="onTimestampChange($event)"
    />

    <app-input
      class="output-text"
      [value]="readableDate()"
      [description]="'Enter a timestamp above and click Convert'"
      [isOutputContainer]="true"
    />
  </div>
  <app-button
    class="button"
    [label]="'Convert'"
    [disabled]="!timestamp()"
    (click)="convertTimestamp()"
  />
</div>

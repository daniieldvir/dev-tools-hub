<div class="json-formatter-container">
    <h2>JSON Formatter</h2>
    
    <div class="json-formatter-content">
    
        <textarea
        #input
        placeholder="Enter Json here..."
        class="panel-style"
        (input)="handleInputChange(input.value)">
      </textarea>
      
      <textarea
        placeholder="the Formatted json"
        class="panel-style"
        [value]="formattedJson()"
        disabled>
      </textarea>
    
    </div>
    
    <app-button
      class="button"
      [label]="'Format'"
      (click)="handleFormatClick()" />
    
    </div>

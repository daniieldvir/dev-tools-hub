<div class="password-generator-container">
  <h2>Password Generator</h2>

  <div class="password-output-section">
    @if (password()) {
      <div class="password-display">
        <span class="password-text">{{ password() }}</span>
        <lucide-icon class="copy-icon" name="copy" [size]="18" (click)="copyPassword()" />
      </div>
    } @else {
      <p class="placeholder-text">Your generated password will appear here</p>
    }
  </div>

  <div class="controls-section">
    <div class="length-control">
      <div class="length-header">
        <label>Password Length</label>
        <span class="length-value">{{ length() }}</span>
      </div>
      <input
        class="length-range"
        type="range"
        [min]="4"
        [max]="64"
        [value]="length()"
        (input)="handleLengthChange($event)"
      />
      <div class="length-range-labels">
        <span>4</span>
        <span>64</span>
      </div>
    </div>

    <div class="options-control">
      <label>Include</label>
      <div class="chips-row">
        @for (option of includeOptions(); track option) {
          <app-chip
            [label]="option"
            [isActive]="isOptionActive(option)"
            (chipClick)="toggleIncludeOption(option)"
          />
        }
      </div>
    </div>
  </div>

  <app-button class="button" [label]="'Generate'" (click)="generate()" />
</div>
